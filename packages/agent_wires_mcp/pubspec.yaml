name: agent_wires_mcp
description: MCP server that bridges an LLM agent to a running Flutter app via the Dart VM service. Pairs with agent_wires_probe.
version: 0.1.1

homepage: https://github.com/mohn93/agent-wires/tree/main/packages/agent_wires_mcp
repository: https://github.com/mohn93/agent-wires
issue_tracker: https://github.com/mohn93/agent-wires/issues
documentation: https://github.com/mohn93/agent-wires#readme

topics:
  - qa
  - testing
  - mcp
  - llm

environment:
  sdk: ^3.5.0

dependencies:
  analyzer: ^6.4.0
  args: ^2.5.0
  image: ^4.5.0
  meta: ^1.9.0
  path: ^1.9.0
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  vm_service: ^14.0.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0

executables:
  agent_wires_mcp: agent_wires_mcp
